<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="./../js/game.js"></script>
    <link rel="stylesheet" href="./../styles/game.css">
    <link rel="icon" href="./../assets/primero_logo.png" type="image/png">
    <title>Primero</title>
</head>
<body>
    <div id="game">
        <section id="controls">
            <div class="users_container">
                <table id="users"></table>
            </div>
            <div id="table">⬇ Throw a card...</div>
            <button id="deck">⬆ Get a card...</button>
            <div class="primero_button">
                <button id="primero">
                    <img src="./../assets/primero_logo.png" alt="Primero button">
                </button>
            </div>
        </section>
        <section id="board"></section>
    </div>
</body>
</html>
