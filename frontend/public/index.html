<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/style.css">
    <script type="module" src="./js/script.js"></script>
    <link rel="icon" href="./assets/primero_logo.png" type="image/png">
    <title>Primero</title>
</head>
<body>
    <section class="card join_card">
        <h1>Entra a una sala</h1>
        <label for="username">Nombre de usuario:</label>
        <input class="input_text" type="text" name="username" id="username" minlength="8">
        <label for="code">Codigo de sala:</label>
        <input class="input_text input_code" type="text" name="code" id="code" maxlength="6">
        <button class="btn btn_join" id="submit">Entrar</button>
        <button class="btn btn_room" id="create_room">Crear sala</button>
    </section>
</body>
</html>
